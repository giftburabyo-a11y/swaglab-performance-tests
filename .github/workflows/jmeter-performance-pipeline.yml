name: Swag Labs Performance Tests (JMeter)

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - peak
          - stress
          - endurance

jobs:

  baseline-test:
    name: Baseline Test (50 Users)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-5.6.3

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -O /tmp/jmeter.tgz
          sudo mkdir -p /opt/jmeter
          sudo tar -xzf /tmp/jmeter.tgz --strip-components=1 -C /opt/jmeter
          echo "JMeter installed"

      - name: Validate Test Plan
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          try:
            ET.parse('tests/SwagLabs_Performance_Test.jmx')
            print('XML is valid')
          except ET.ParseError as e:
            print(f'XML error: {e}')
            exit(1)
          "

      - name: Create Results Directories
        run: mkdir -p results reports/baseline

      - name: Run Baseline Test (50 Users)
        run: |
          /opt/jmeter/bin/jmeter \
            -n \
            -t tests/SwagLabs_Performance_Test.jmx \
            -Jthreads=50 \
            -Jrampup=60 \
            -Jloops=3 \
            -l results/baseline.jtl \
            -e -o reports/baseline \
            --loglevel WARN
          echo "Baseline test complete"

      - name: Parse Results
        id: parse-results
        run: |
          python3 << 'EOF'
          import csv, os, sys

          f = 'results/baseline.jtl'
          if not os.path.exists(f):
            print("No results file found")
            sys.exit(0)

          total, errors, elapsed_sum = 0, 0, 0
          with open(f) as fp:
            for row in csv.DictReader(fp):
              total += 1
              if row.get('success','true').lower() != 'true':
                errors += 1
              elapsed_sum += int(row.get('elapsed', 0))

          if total == 0:
            print("No samples found")
            sys.exit(0)

          error_rate = (errors / total) * 100
          avg_ms = elapsed_sum // total

          print(f"Total: {total} | Errors: {errors} | Error Rate: {error_rate:.2f}% | Avg: {avg_ms}ms")

          with open(os.environ['GITHUB_OUTPUT'], 'a') as out:
            out.write(f"total={total}\n")
            out.write(f"errors={errors}\n")
            out.write(f"error_rate={error_rate:.2f}\n")
            out.write(f"avg_ms={avg_ms}\n")
            passed = total - errors
            out.write(f"passed={passed}\n")
            pass_pct = int((passed / total) * 100)
            out.write(f"pass_pct={pass_pct}\n")
            status = "PASSED" if error_rate <= 1 else "FAILED"
            out.write(f"status={status}\n")

          if error_rate > 1:
            print(f"FAIL: Error rate {error_rate:.2f}% exceeds 1%")
            sys.exit(1)
          print("PASS")
          EOF

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: reports/baseline/
          retention-days: 30

      - name: Upload Baseline JTL Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-jtl
          path: results/baseline.jtl
          retention-days: 30

      - name: Send Email Report
        if: always()
        env:
          GMAIL_ADDRESS:  ${{ secrets.GMAIL_ADDRESS }}
          GMAIL_APP_PASS: ${{ secrets.GMAIL_APP_PASS }}
          REPORT_TO:      ${{ secrets.REPORT_EMAIL }}
        run: |
          python3 << 'PYEOF'
          import os, smtplib
          from email.mime.multipart import MIMEMultipart
          from email.mime.text import MIMEText
          from datetime import datetime, timezone

          gmail_user = os.environ.get("GMAIL_ADDRESS", "")
          gmail_pass = os.environ.get("GMAIL_APP_PASS", "")
          report_to  = os.environ.get("REPORT_TO", "")

          if not all([gmail_user, gmail_pass, report_to]):
            print("Email secrets not configured — skipping")
            exit(0)

          total     = "${{ steps.parse-results.outputs.total }}"     or "0"
          passed    = "${{ steps.parse-results.outputs.passed }}"    or "0"
          errors    = "${{ steps.parse-results.outputs.errors }}"    or "0"
          error_rate= "${{ steps.parse-results.outputs.error_rate }}" or "0"
          avg_ms    = "${{ steps.parse-results.outputs.avg_ms }}"    or "0"
          pass_pct  = "${{ steps.parse-results.outputs.pass_pct }}"  or "0"
          status    = "${{ steps.parse-results.outputs.status }}"    or "UNKNOWN"

          is_pass   = status == "PASSED"
          s_icon    = "✅" if is_pass else "❌"
          s_color   = "#2e7d32" if is_pass else "#b71c1c"
          s_bg      = "#e8f5e9" if is_pass else "#ffebee"
          timestamp = datetime.now(timezone.utc).strftime("%d %B %Y at %H:%M UTC")
          run_url   = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          branch    = "${{ github.ref_name }}"
          short_sha = "${{ github.sha }}"[:7]
          commit_url= "${{ github.server_url }}/${{ github.repository }}/commit/${{ github.sha }}"
          run_num   = "${{ github.run_number }}"
          actor     = "${{ github.actor }}"
          event     = "${{ github.event_name }}"
          trigger   = {"push":"Push to branch","pull_request":"Pull Request","workflow_dispatch":"Manual trigger"}.get(event, event)

          next_steps = (
            "All tests passed. The application is stable under baseline load. No action required."
            if is_pass else
            "<strong>Action required.</strong> Error rate exceeded 1%. "
            "Review the JTL results and HTML report artifacts on GitHub."
          )

          html = f"""<!DOCTYPE html><html lang="en">
          <head><meta charset="UTF-8"></head>
          <body style="margin:0;padding:0;background:#f4f6f9;font-family:Arial,sans-serif">
          <table width="100%" cellpadding="0" cellspacing="0" style="background:#f4f6f9;padding:32px 0">
          <tr><td align="center">
          <table width="620" cellpadding="0" cellspacing="0" style="max-width:620px;width:100%">
            <tr><td style="background:#1a237e;border-radius:10px 10px 0 0;padding:28px 36px">
              <p style="margin:0;font-size:11px;color:#9fa8da;letter-spacing:1px;text-transform:uppercase">Automated Performance Report</p>
              <h1 style="margin:6px 0 0;font-size:24px;color:#fff;font-weight:700">DemoBlaze JMeter CI Pipeline</h1>
              <p style="margin:6px 0 0;font-size:12px;color:#9fa8da">${{ github.repository }} &middot; Run #{run_num}</p>
            </td></tr>
            <tr><td style="background:{s_bg};padding:20px 36px;border-left:5px solid {s_color}">
              <p style="margin:0;font-size:20px;font-weight:700;color:{s_color}">{s_icon} Baseline Test {status}</p>
              <p style="margin:6px 0 0;font-size:12px;color:#555">Completed on {timestamp}</p>
            </td></tr>
            <tr><td style="background:#fff;padding:28px 36px">
              <h2 style="margin:0 0 14px;font-size:17px;color:#1a237e">Run Details</h2>
              <table width="100%" cellpadding="0" cellspacing="0" style="border:1px solid #e8eaf0;border-radius:8px;font-size:13px;margin-bottom:28px">
                <tr style="background:#f5f7ff">
                  <td style="padding:9px 14px;font-weight:700;color:#3949ab;border-bottom:1px solid #e8eaf0;width:38%">Field</td>
                  <td style="padding:9px 14px;font-weight:700;color:#3949ab;border-bottom:1px solid #e8eaf0">Value</td>
                </tr>
                <tr><td style="padding:9px 14px;color:#555;border-bottom:1px solid #f0f0f0;font-weight:600">Repository</td><td style="padding:9px 14px;border-bottom:1px solid #f0f0f0">${{ github.repository }}</td></tr>
                <tr style="background:#fafafa"><td style="padding:9px 14px;color:#555;border-bottom:1px solid #f0f0f0;font-weight:600">Branch</td><td style="padding:9px 14px;border-bottom:1px solid #f0f0f0">{branch}</td></tr>
                <tr><td style="padding:9px 14px;color:#555;border-bottom:1px solid #f0f0f0;font-weight:600">Commit</td><td style="padding:9px 14px;border-bottom:1px solid #f0f0f0"><a href="{commit_url}" style="color:#1a237e">{short_sha}</a></td></tr>
                <tr style="background:#fafafa"><td style="padding:9px 14px;color:#555;border-bottom:1px solid #f0f0f0;font-weight:600">Triggered by</td><td style="padding:9px 14px;border-bottom:1px solid #f0f0f0">{actor} ({trigger})</td></tr>
                <tr><td style="padding:9px 14px;color:#555;font-weight:600">Environment</td><td style="padding:9px 14px">ubuntu-latest &middot; Java 11 &middot; JMeter 5.6.3</td></tr>
              </table>
              <h2 style="margin:0 0 14px;font-size:17px;color:#1a237e">Performance Summary</h2>
              <table width="100%" cellpadding="6" cellspacing="6" style="margin-bottom:12px">
                <tr>
                  <td style="background:#e8f5e9;border-radius:8px;padding:14px;text-align:center"><p style="margin:0;font-size:26px;font-weight:700;color:#2e7d32">{passed}</p><p style="margin:4px 0 0;font-size:11px;color:#555;text-transform:uppercase">Passed</p></td>
                  <td style="background:#ffebee;border-radius:8px;padding:14px;text-align:center"><p style="margin:0;font-size:26px;font-weight:700;color:#b71c1c">{errors}</p><p style="margin:4px 0 0;font-size:11px;color:#555;text-transform:uppercase">Errors</p></td>
                  <td style="background:#e3f2fd;border-radius:8px;padding:14px;text-align:center"><p style="margin:0;font-size:26px;font-weight:700;color:#1565c0">{avg_ms}ms</p><p style="margin:4px 0 0;font-size:11px;color:#555;text-transform:uppercase">Avg Response</p></td>
                  <td style="background:#f5f5f5;border-radius:8px;padding:14px;text-align:center"><p style="margin:0;font-size:26px;font-weight:700;color:#333">{total}</p><p style="margin:4px 0 0;font-size:11px;color:#555;text-transform:uppercase">Total Samples</p></td>
                </tr>
              </table>
              <p style="margin:4px 0 6px;font-size:13px;color:#555">Pass rate: <strong>{pass_pct}%</strong> &nbsp;|&nbsp; Error rate: <strong>{error_rate}%</strong></p>
              <div style="background:#e0e0e0;border-radius:99px;height:10px;margin-bottom:28px">
                <div style="background:{s_color};width:{pass_pct}%;height:10px;border-radius:99px;min-width:4px"></div>
              </div>
              <h2 style="margin:32px 0 12px;font-size:17px;color:#1a237e">Next Steps</h2>
              <div style="background:#f5f7ff;border-radius:8px;padding:16px 20px;font-size:13px;color:#333;line-height:1.8">{next_steps}</div>
              <div style="text-align:center;margin-top:32px">
                <a href="{run_url}" style="display:inline-block;background:#1a237e;color:#fff;text-decoration:none;padding:14px 28px;border-radius:6px;font-size:14px;font-weight:700;margin:5px">View Run on GitHub &rarr;</a>
                <a href="{run_url}#artifacts" style="display:inline-block;background:#3949ab;color:#fff;text-decoration:none;padding:14px 28px;border-radius:6px;font-size:14px;font-weight:700;margin:5px">Download HTML Report &darr;</a>
              </div>
            </td></tr>
            <tr><td style="background:#f5f7ff;border-radius:0 0 10px 10px;padding:16px 36px;text-align:center;border-top:1px solid #e8eaf0">
              <p style="margin:0;font-size:11px;color:#9e9e9e">Generated automatically by DemoBlaze JMeter CI pipeline</p>
            </td></tr>
          </table></td></tr></table>
          </body></html>"""

          subject = f"{s_icon} [Run #{run_num}] DemoBlaze Baseline Test {status} — {branch}"
          msg = MIMEMultipart("alternative")
          msg["Subject"] = subject
          msg["From"]    = f"JMeter CI <{gmail_user}>"
          msg["To"]      = report_to
          msg.attach(MIMEText(html, "html"))

          with smtplib.SMTP_SSL("smtp.gmail.com", 465) as server:
            server.login(gmail_user, gmail_pass)
            server.sendmail(gmail_user, report_to, msg.as_string())
          print(f"Email sent to {report_to}")
          PYEOF

      - name: Send Slack Report
        if: always()
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
        run: |
          python3 << 'PYEOF'
          import json, os, subprocess, sys

          webhook = os.environ.get("SLACK_WEBHOOK_URL", "")
          if not webhook:
            print("No SLACK_WEBHOOK_URL — skipping")
            sys.exit(0)

          total      = "${{ steps.parse-results.outputs.total }}"      or "0"
          passed     = "${{ steps.parse-results.outputs.passed }}"     or "0"
          errors     = "${{ steps.parse-results.outputs.errors }}"     or "0"
          error_rate = "${{ steps.parse-results.outputs.error_rate }}" or "0"
          avg_ms     = "${{ steps.parse-results.outputs.avg_ms }}"     or "0"
          pass_pct   = "${{ steps.parse-results.outputs.pass_pct }}"   or "0"
          status     = "${{ steps.parse-results.outputs.status }}"     or "UNKNOWN"

          is_pass  = status == "PASSED"
          s_emoji  = "✅" if is_pass else "❌"
          color    = "#2e7d32" if is_pass else "#e01e5a"
          repo     = "${{ github.repository }}"
          branch   = "${{ github.ref_name }}"
          actor    = "${{ github.actor }}"
          run_num  = "${{ github.run_number }}"
          run_url  = "${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}"
          sha      = "${{ github.sha }}"[:7]
          event    = "${{ github.event_name }}"
          trigger  = {"push":"Push to branch","pull_request":"Pull Request","workflow_dispatch":"Manual trigger"}.get(event, event)

          next_steps = (
            "All tests passed. Application is stable under baseline load."
            if is_pass else
            ":rotating_light: Error rate exceeded 1%. Review artifacts on GitHub."
          )

          blocks = [
            {"type": "header", "text": {"type": "plain_text", "text": f"{s_emoji}  DemoBlaze JMeter CI — Baseline Test {status}", "emoji": True}},
            {"type": "divider"},
            {"type": "section", "fields": [
              {"type": "mrkdwn", "text": f"*Repository*\n{repo}"},
              {"type": "mrkdwn", "text": f"*Branch*\n{branch}"},
              {"type": "mrkdwn", "text": f"*Triggered by*\n{actor} ({trigger})"},
              {"type": "mrkdwn", "text": f"*Commit*\n`{sha}`"},
              {"type": "mrkdwn", "text": f"*Run*\n<{run_url}|Run #{run_num}>"},
              {"type": "mrkdwn", "text": f"*Environment*\nubuntu-latest · Java 11 · JMeter 5.6.3"},
            ]},
            {"type": "divider"},
            {"type": "section", "text": {"type": "mrkdwn", "text": (
              f"*Performance Summary*\n"
              f"✅ Passed: *{passed}*   ❌ Errors: *{errors}*   "
              f"⏱ Avg Response: *{avg_ms}ms*   📊 Total Samples: *{total}*\n"
              f"📈 Pass Rate: *{pass_pct}%*   🔴 Error Rate: *{error_rate}%*"
            )}},
            {"type": "divider"},
            {"type": "section", "text": {"type": "mrkdwn", "text": f"*Next Steps*\n{next_steps}"}},
            {"type": "divider"},
            {"type": "actions", "elements": [
              {"type": "button", "text": {"type": "plain_text", "text": "View Run on GitHub", "emoji": True}, "url": run_url, "style": "primary"},
              {"type": "button", "text": {"type": "plain_text", "text": "Download HTML Report", "emoji": True}, "url": f"{run_url}#artifacts"},
            ]}
          ]

          payload = {
            "text": f"{s_emoji} DemoBlaze Baseline Test {status} — Run #{run_num}",
            "attachments": [{"color": color, "blocks": blocks}]
          }

          result = subprocess.run(
            ["curl", "-s", "-X", "POST", webhook, "-H", "Content-Type: application/json", "-d", json.dumps(payload)],
            capture_output=True, text=True
          )
          print(result.stdout)
          print("Slack notification sent.")
          PYEOF

  load-test:
    name: Load Test (150 Users)
    runs-on: ubuntu-latest
    needs: baseline-test
    if: github.event.inputs.test_type == 'load' || github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Restore JMeter Cache
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-5.6.3

      - name: Install JMeter
        run: |
          if [ ! -f /opt/jmeter/bin/jmeter ]; then
            wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -O /tmp/jmeter.tgz
            sudo mkdir -p /opt/jmeter
            sudo tar -xzf /tmp/jmeter.tgz --strip-components=1 -C /opt/jmeter
          fi

      - name: Create Results Directories
        run: mkdir -p results reports/load

      - name: Run Load Test (150 Users)
        run: |
          /opt/jmeter/bin/jmeter \
            -n \
            -t tests/SwagLabs_Performance_Test.jmx \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jloops=3 \
            -l results/load.jtl \
            -e -o reports/load \
            --loglevel WARN

      - name: Upload Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-html-report
          path: reports/load/
          retention-days: 30

  stress-test:
    name: Stress Test (500 Users)
    runs-on: ubuntu-latest
    needs: load-test
    if: github.event.inputs.test_type == 'stress' || github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Restore JMeter Cache
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-5.6.3

      - name: Install JMeter
        run: |
          if [ ! -f /opt/jmeter/bin/jmeter ]; then
            wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -O /tmp/jmeter.tgz
            sudo mkdir -p /opt/jmeter
            sudo tar -xzf /tmp/jmeter.tgz --strip-components=1 -C /opt/jmeter
          fi

      - name: Create Results Directories
        run: mkdir -p results reports/stress

      - name: Run Stress Test (500 Users)
        continue-on-error: true
        run: |
          /opt/jmeter/bin/jmeter \
            -n \
            -t tests/SwagLabs_Performance_Test.jmx \
            -Jthreads=500 \
            -Jrampup=120 \
            -Jloops=1 \
            -l results/stress.jtl \
            -e -o reports/stress \
            --loglevel WARN

      - name: Upload Stress Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-html-report
          path: reports/stress/
          retention-days: 30

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [baseline-test, load-test, stress-test]
    if: always()

    steps:
      - name: Write Summary
        run: |
          echo "# DemoBlaze JMeter Performance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "**Triggered by:** ${{ github.actor }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Users | Ramp-Up | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|---------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline | 50 | 60s | ${{ needs.baseline-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Load | 150 | 120s | ${{ needs.load-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress | 500 | 120s | ${{ needs.stress-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "📥 Download HTML reports from the Artifacts section above." >> $GITHUB_STEP_SUMMARY
