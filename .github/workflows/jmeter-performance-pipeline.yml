name: Swag Labs Performance Tests (JMeter)

on:
  push:
    branches:
      - master
  workflow_dispatch:
    inputs:
      test_type:
        description: 'Select test type to run'
        required: true
        default: 'baseline'
        type: choice
        options:
          - baseline
          - load
          - peak
          - stress
          - endurance

jobs:

  baseline-test:
    name: Baseline Test (50 Users)
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Cache JMeter
        id: cache-jmeter
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-5.6.3

      - name: Install JMeter
        if: steps.cache-jmeter.outputs.cache-hit != 'true'
        run: |
          wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -O /tmp/jmeter.tgz
          sudo mkdir -p /opt/jmeter
          sudo tar -xzf /tmp/jmeter.tgz --strip-components=1 -C /opt/jmeter
          echo "JMeter installed"

      - name: Validate Test Plan
        run: |
          python3 -c "
          import xml.etree.ElementTree as ET
          try:
            ET.parse('tests/SwagLabs_Performance_Test.jmx')
            print('XML is valid')
          except ET.ParseError as e:
            print(f'XML error: {e}')
            exit(1)
          "

      - name: Create Results Directories
        run: mkdir -p results reports/baseline

      - name: Run Baseline Test (50 Users)
        run: |
          /opt/jmeter/bin/jmeter \
            -n \
            -t tests/SwagLabs_Performance_Test.jmx \
            -Jthreads=50 \
            -Jrampup=60 \
            -Jloops=3 \
            -l results/baseline.jtl \
            -e -o reports/baseline \
            --loglevel WARN
          echo "Baseline test complete"

      - name: Check Results
        run: |
          python3 << 'EOF'
          import csv, os, sys
          f = 'results/baseline.jtl'
          if not os.path.exists(f):
            print("No results file found")
            sys.exit(0)
          total, errors = 0, 0
          with open(f) as fp:
            for row in csv.DictReader(fp):
              total += 1
              if row.get('success','true').lower() != 'true':
                errors += 1
          if total == 0:
            print("No samples found")
            sys.exit(0)
          rate = (errors/total)*100
          print(f"Total: {total} | Errors: {errors} | Error Rate: {rate:.2f}%")
          if rate > 1:
            print("FAIL: Error rate exceeds 1%")
            sys.exit(1)
          print("PASS")
          EOF

      - name: Upload Baseline HTML Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-html-report
          path: reports/baseline/
          retention-days: 30

      - name: Upload Baseline Results
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: baseline-jtl
          path: results/baseline.jtl
          retention-days: 30

  load-test:
    name: Load Test (150 Users)
    runs-on: ubuntu-latest
    needs: baseline-test
    if: github.event.inputs.test_type == 'load' || github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Restore JMeter Cache
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-5.6.3

      - name: Install JMeter
        run: |
          if [ ! -f /opt/jmeter/bin/jmeter ]; then
            wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -O /tmp/jmeter.tgz
            sudo mkdir -p /opt/jmeter
            sudo tar -xzf /tmp/jmeter.tgz --strip-components=1 -C /opt/jmeter
          fi

      - name: Create Results Directories
        run: mkdir -p results reports/load

      - name: Run Load Test (150 Users)
        run: |
          /opt/jmeter/bin/jmeter \
            -n \
            -t tests/SwagLabs_Performance_Test.jmx \
            -Jthreads=150 \
            -Jrampup=120 \
            -Jloops=3 \
            -l results/load.jtl \
            -e -o reports/load \
            --loglevel WARN

      - name: Upload Load Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: load-html-report
          path: reports/load/
          retention-days: 30

  stress-test:
    name: Stress Test (500 Users)
    runs-on: ubuntu-latest
    needs: load-test
    if: github.event.inputs.test_type == 'stress' || github.event_name == 'push'

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Java 11
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '11'

      - name: Restore JMeter Cache
        uses: actions/cache@v4
        with:
          path: /opt/jmeter
          key: jmeter-5.6.3

      - name: Install JMeter
        run: |
          if [ ! -f /opt/jmeter/bin/jmeter ]; then
            wget -q https://archive.apache.org/dist/jmeter/binaries/apache-jmeter-5.6.3.tgz -O /tmp/jmeter.tgz
            sudo mkdir -p /opt/jmeter
            sudo tar -xzf /tmp/jmeter.tgz --strip-components=1 -C /opt/jmeter
          fi

      - name: Create Results Directories
        run: mkdir -p results reports/stress

      - name: Run Stress Test (500 Users)
        continue-on-error: true
        run: |
          /opt/jmeter/bin/jmeter \
            -n \
            -t tests/SwagLabs_Performance_Test.jmx \
            -Jthreads=500 \
            -Jrampup=120 \
            -Jloops=1 \
            -l results/stress.jtl \
            -e -o reports/stress \
            --loglevel WARN

      - name: Upload Stress Test Report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: stress-html-report
          path: reports/stress/
          retention-days: 30

  summary:
    name: Test Summary
    runs-on: ubuntu-latest
    needs: [baseline-test, load-test, stress-test]
    if: always()

    steps:
      - name: Write Summary
        run: |
          echo "# Swag Labs Performance Test Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "**Date:** $(date -u '+%Y-%m-%d %H:%M UTC')" >> $GITHUB_STEP_SUMMARY
          echo "**Branch:** ${{ github.ref_name }}" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "| Test | Users | Status |" >> $GITHUB_STEP_SUMMARY
          echo "|------|-------|--------|" >> $GITHUB_STEP_SUMMARY
          echo "| Baseline | 50 | ${{ needs.baseline-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Load | 150 | ${{ needs.load-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "| Stress | 500 | ${{ needs.stress-test.result }} |" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          echo "Download HTML reports from the Artifacts section." >> $GITHUB_STEP_SUMMARY
